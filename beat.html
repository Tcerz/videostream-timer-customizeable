<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beat Pulse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  #stage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #beat-status {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: rgba(0, 0, 0, 0.35);
  }
  .beat-status-text {
    color: #ffffff;
    font-size: 15px;
    text-align: center;
    max-width: 80%;
  }
  .beat-enable-btn {
    background: #3BD16F;
    color: #06210F;
    border: none;
    border-radius: 999px;
    padding: 12px 26px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .beat-enable-btn:hover { filter: brightness(1.08); }
  .beat-device-row {
    display: none;
    align-items: center;
    gap: 8px;
  }
  .beat-device-select {
    background: rgba(255, 255, 255, 0.12);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    max-width: 280px;
  }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="beat-status">
    <div class="beat-status-text">Click to enable audio</div>
    <button type="button" class="beat-enable-btn">Enable Audio</button>
    <div class="beat-device-row">
      <label class="beat-status-text" style="font-size:12px;">Input:</label>
      <select class="beat-device-select"></select>
    </div>
  </div>

  <script src="js/beat-core.js"></script>
  <script>
    BeatCore.start('#stage', '#beat-status');
  </script>
</body>
</html>
