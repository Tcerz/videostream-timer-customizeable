<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timer Widget</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  #timer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* Generic play / pause / reset bar — deliberately not part of any
     template, so it looks the same regardless of which look you pick.
     Crop it out in OBS/vMix if you don't want it visible on stream. */
  .timer-controls {
    display: flex;
    gap: 8px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 6px;
    border-radius: 999px;
  }
  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.12);
    color: #ffffff;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.25); }
  .ctrl-btn:disabled { opacity: 0.35; cursor: default; }
  .ctrl-play { color: #3BD16F; }
  .ctrl-pause { color: #FFB020; }
  .ctrl-reset { color: #E8E6E1; font-size: 16px; }
</style>
</head>
<body>
  <div id="timer"></div>

  <script src="js/templates.js"></script>
  <script src="js/timer-core.js"></script>
  <script>
    TimerCore.start('#timer');
  </script>
</body>
</html>
