<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timer Widget</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  #timer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: inline-flex;
  }
</style>
</head>
<body>
  <div id="timer"></div>

  <script src="js/templates.js"></script>
  <script src="js/timer-core.js"></script>
  <script>
    TimerCore.start('#timer');
  </script>
</body>
</html>
